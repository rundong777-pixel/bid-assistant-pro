<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>生成图标</title>
<style>
body { 
    margin: 0; 
    display: flex; 
    flex-direction: column;
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    background: #f0f0f0;
    font-family: Arial, sans-serif;
}
#preview { 
    width: 216px; 
    height: 216px; 
    border-radius: 40px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
button { 
    padding: 15px 30px; 
    background: #667eea; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
}
button:hover {
    background: #5a6fd6;
}
.instructions {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 8px;
    max-width: 400px;
    color: #666;
}
</style>
</head>
<body>
<canvas id="preview" width="216" height="216"></canvas>
<button onclick="downloadIcon()">📥 下载 PNG 图标 (216x216)</button>
<div class="instructions">
    <strong>使用方法：</strong><br>
    1. 点击上方按钮下载图标<br>
    2. 回到华为开发者页面<br>
    3. 点击应用图标上传框<br>
    4. 选择下载的 PNG 文件
</div>

<script>
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');

// 绘制渐变背景
const gradient = ctx.createLinearGradient(0, 0, 216, 216);
gradient.addColorStop(0, '#667eea');
gradient.addColorStop(1, '#764ba2');

// 绘制圆角矩形
ctx.fillStyle = gradient;
ctx.beginPath();
ctx.moveTo(40, 0);
ctx.lineTo(176, 0);
ctx.quadraticCurveTo(216, 0, 216, 40);
ctx.lineTo(216, 176);
ctx.quadraticCurveTo(216, 216, 176, 216);
ctx.lineTo(40, 216);
ctx.quadraticCurveTo(0, 216, 0, 176);
ctx.lineTo(0, 40);
ctx.quadraticCurveTo(0, 0, 40, 0);
ctx.closePath();
ctx.fill();

// 绘制文字
ctx.fillStyle = 'white';
ctx.font = 'bold 120px "Microsoft YaHei", "SimHei", sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('招', 108, 118);

function downloadIcon() {
    const link = document.createElement('a');
    link.download = 'app-icon-216.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    alert('图标已下载！请到下载文件夹找到 app-icon-216.png');
}
</script>
</body>
</html>
