<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>生成华为应用商店截图 (450x800)</title>
<style>
body { 
    margin: 0; 
    padding: 20px;
    background: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.container {
    max-width: 1200px;
    margin: 0 auto;
}
h1 {
    text-align: center;
    margin-bottom: 10px;
}
.instructions {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
}
.screenshot-section {
    margin-bottom: 40px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}
.screenshot-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 15px;
    color: #333;
}
.canvas-container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}
canvas {
    border: 2px solid #ddd;
    border-radius: 10px;
}
.download-btn {
    padding: 12px 24px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
}
.download-btn:hover {
    background: #5a6fd6;
}
</style>
</head>
<body>
<div class="container">
    <h1>招标助手 Pro - 华为应用商店截图生成器</h1>
    <p class="instructions">点击下方按钮下载截图（450x800 像素），共 5 张</p>

    <!-- 截图1: 首页 -->
    <div class="screenshot-section">
        <div class="screenshot-title">截图 1: 首页 - 招标列表</div>
        <div class="canvas-container">
            <canvas id="canvas1" width="450" height="800"></canvas>
            <button class="download-btn" onclick="downloadScreenshot(1, '首页-招标列表')">📥 下载截图1</button>
        </div>
    </div>

    <!-- 截图2: 筛选页 -->
    <div class="screenshot-section">
        <div class="screenshot-title">截图 2: 智能筛选</div>
        <div class="canvas-container">
            <canvas id="canvas2" width="450" height="800"></canvas>
            <button class="download-btn" onclick="downloadScreenshot(2, '智能筛选')">📥 下载截图2</button>
        </div>
    </div>

    <!-- 截图3: 收藏页 -->
    <div class="screenshot-section">
        <div class="screenshot-title">截图 3: 我的收藏</div>
        <div class="canvas-container">
            <canvas id="canvas3" width="450" height="800"></canvas>
            <button class="download-btn" onclick="downloadScreenshot(3, '我的收藏')">📥 下载截图3</button>
        </div>
    </div>

    <!-- 截图4: 个人中心 -->
    <div class="screenshot-section">
        <div class="screenshot-title">截图 4: 个人中心</div>
        <div class="canvas-container">
            <canvas id="canvas4" width="450" height="800"></canvas>
            <button class="download-btn" onclick="downloadScreenshot(4, '个人中心')">📥 下载截图4</button>
        </div>
    </div>

    <!-- 截图5: 关于页 -->
    <div class="screenshot-section">
        <div class="screenshot-title">截图 5: 关于</div>
        <div class="canvas-container">
            <canvas id="canvas5" width="450" height="800"></canvas>
            <button class="download-btn" onclick="downloadScreenshot(5, '关于')">📥 下载截图5</button>
        </div>
    </div>

    <div style="text-align: center; margin-top: 40px; padding: 20px; background: #fff3cd; border-radius: 10px;">
        <strong>💡 提示：</strong>下载所有 5 张截图后，回到华为开发者页面上传
    </div>
</div>

<script>
// 绘制截图1: 首页
function drawScreenshot1() {
    const canvas = document.getElementById('canvas1');
    const ctx = canvas.getContext('2d');
    
    // 背景
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(0, 0, 450, 800);
    
    // 状态栏
    ctx.fillStyle = '#667eea';
    ctx.fillRect(0, 0, 450, 36);
    ctx.fillStyle = 'white';
    ctx.font = '12px Arial';
    ctx.fillText('9:41', 16, 24);
    ctx.fillText('📶 5G 🔋', 380, 24);
    
    // 标题栏
    const gradient = ctx.createLinearGradient(0, 36, 0, 100);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(1, '#764ba2');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 36, 450, 64);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('招标助手 Pro', 225, 75);
    
    // 招标卡片1
    drawBidCard(ctx, 20, 120, '零跑', '2026-03-20', '2026年度营销活动策划服务采购项目', '2026-04-20', '#4CAF50');
    // 招标卡片2
    drawBidCard(ctx, 20, 280, '一汽', '2026-03-19', '新能源汽车电池供应商招标公告', '2026-04-15', '#f44336');
    // 招标卡片3
    drawBidCard(ctx, 20, 440, '东风', '2026-03-18', '智能驾驶系统研发项目合作招标', '2026-04-10', '#2196F3');
    
    // 底部导航
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 740, 450, 60);
    ctx.strokeStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(0, 740);
    ctx.lineTo(450, 740);
    ctx.stroke();
    
    // 导航项
    drawNavItem(ctx, 56, 755, '🏠', '首页', true);
    drawNavItem(ctx, 169, 755, '🔍', '筛选', false);
    drawNavItem(ctx, 281, 755, '⭐', '收藏', false);
    drawNavItem(ctx, 394, 755, '👤', '我的', false);
}

function drawBidCard(ctx, x, y, source, date, title, deadline, color) {
    // 卡片背景
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.roundRect(x, y, 410, 140, 10);
    ctx.fill();
    ctx.shadowColor = 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = 5;
    ctx.shadowOffsetY = 2;
    
    // 来源标签
    ctx.fillStyle = color + '20';
    ctx.fillRect(x + 15, y + 15, 50, 24);
    ctx.fillStyle = color;
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(source, x + 40, y + 31);
    
    // 日期
    ctx.fillStyle = '#999';
    ctx.font = '12px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(date, x + 390, y + 31);
    
    // 标题
    ctx.fillStyle = '#333';
    ctx.font = '15px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(title.substring(0, 22), x + 15, y + 65);
    if (title.length > 22) {
        ctx.fillText(title.substring(22, 44), x + 15, y + 85);
    }
    
    // 截止时间和状态
    ctx.fillStyle = '#FF9800';
    ctx.font = '12px Arial';
    ctx.fillText('截止: ' + deadline, x + 15, y + 115);
    
    ctx.fillStyle = '#4CAF5020';
    ctx.fillRect(x + 340, y + 105, 50, 20);
    ctx.fillStyle = '#4CAF50';
    ctx.textAlign = 'center';
    ctx.fillText('进行中', x + 365, y + 119);
}

function drawNavItem(ctx, x, y, icon, label, active) {
    ctx.textAlign = 'center';
    ctx.fillStyle = active ? '#667eea' : '#999';
    ctx.font = '20px Arial';
    ctx.fillText(icon, x, y + 5);
    ctx.font = '10px Arial';
    ctx.fillText(label, x, y + 22);
}

// 绘制截图2: 筛选页
function drawScreenshot2() {
    const canvas = document.getElementById('canvas2');
    const ctx = canvas.getContext('2d');
    
    // 背景
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(0, 0, 450, 800);
    
    // 状态栏和标题栏
    ctx.fillStyle = '#667eea';
    ctx.fillRect(0, 0, 450, 36);
    const gradient = ctx.createLinearGradient(0, 36, 0, 100);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(1, '#764ba2');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 36, 450, 64);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('智能筛选', 225, 75);
    
    // 筛选选项
    drawFilterSection(ctx, 20, 120, '关键词筛选', '新能源、电池、智能驾驶、营销活动...');
    drawFilterSection(ctx, 20, 240, '平台来源', '✓ 一汽  ✓ 东风  ✓ 零跑');
    drawFilterSection(ctx, 20, 360, '地区筛选', '北京、上海、广州、深圳、杭州...');
    drawFilterSection(ctx, 20, 480, '时间范围', '最近7天、最近30天、最近90天');
    
    // 按钮
    ctx.fillStyle = '#667eea';
    ctx.beginPath();
    ctx.roundRect(125, 620, 200, 48, 24);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('应用筛选条件', 225, 650);
    
    // 底部导航
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 740, 450, 60);
    drawNavItem(ctx, 56, 755, '🏠', '首页', false);
    drawNavItem(ctx, 169, 755, '🔍', '筛选', true);
    drawNavItem(ctx, 281, 755, '⭐', '收藏', false);
    drawNavItem(ctx, 394, 755, '👤', '我的', false);
}

function drawFilterSection(ctx, x, y, title, content) {
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.roundRect(x, y, 410, 100, 10);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = 'bold 15px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(title, x + 15, y + 30);
    ctx.fillStyle = '#666';
    ctx.font = '13px Arial';
    ctx.fillText(content, x + 15, y + 60);
}

// 绘制截图3: 收藏页
function drawScreenshot3() {
    const canvas = document.getElementById('canvas3');
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(0, 0, 450, 800);
    
    ctx.fillStyle = '#667eea';
    ctx.fillRect(0, 0, 450, 36);
    const gradient = ctx.createLinearGradient(0, 36, 0, 100);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(1, '#764ba2');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 36, 450, 64);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('我的收藏', 225, 75);
    
    // 空状态
    ctx.fillStyle = '#999';
    ctx.font = '60px Arial';
    ctx.fillText('⭐', 205, 350);
    ctx.font = '18px Arial';
    ctx.fillText('暂无收藏', 225, 420);
    ctx.font = '14px Arial';
    ctx.fillText('点击招标信息右侧的星标即可收藏', 225, 450);
    
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 740, 450, 60);
    drawNavItem(ctx, 56, 755, '🏠', '首页', false);
    drawNavItem(ctx, 169, 755, '🔍', '筛选', false);
    drawNavItem(ctx, 281, 755, '⭐', '收藏', true);
    drawNavItem(ctx, 394, 755, '👤', '我的', false);
}

// 绘制截图4: 个人中心
function drawScreenshot4() {
    const canvas = document.getElementById('canvas4');
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(0, 0, 450, 800);
    
    ctx.fillStyle = '#667eea';
    ctx.fillRect(0, 0, 450, 36);
    const gradient = ctx.createLinearGradient(0, 36, 0, 100);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(1, '#764ba2');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 36, 450, 64);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('个人中心', 225, 75);
    
    drawInfoSection(ctx, 20, 120, '当前套餐', '免费版', '升级专业版 →');
    drawInfoSection(ctx, 20, 240, '推送设置', '已开启招标信息推送通知', '');
    drawInfoSection(ctx, 20, 360, '关键词设置', '新能源、电池、智能驾驶', '');
    drawInfoSection(ctx, 20, 480, '关于', '版本 1.0.0 | 招标助手 Pro', '');
    
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 740, 450, 60);
    drawNavItem(ctx, 56, 755, '🏠', '首页', false);
    drawNavItem(ctx, 169, 755, '🔍', '筛选', false);
    drawNavItem(ctx, 281, 755, '⭐', '收藏', false);
    drawNavItem(ctx, 394, 755, '👤', '我的', true);
}

function drawInfoSection(ctx, x, y, title, content, action) {
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.roundRect(x, y, 410, 100, 10);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(title, x + 15, y + 30);
    ctx.fillStyle = '#666';
    ctx.font = '13px Arial';
    ctx.fillText(content, x + 15, y + 55);
    if (action) {
        ctx.fillStyle = '#667eea';
        ctx.textAlign = 'right';
        ctx.fillText(action, x + 390, y + 55);
    }
}

// 绘制截图5: 关于页
function drawScreenshot5() {
    const canvas = document.getElementById('canvas5');
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(0, 0, 450, 800);
    
    ctx.fillStyle = '#667eea';
    ctx.fillRect(0, 0, 450, 36);
    const gradient = ctx.createLinearGradient(0, 36, 0, 100);
    gradient.addColorStop(0, '#667eea');
    gradient.addColorStop(1, '#764ba2');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 36, 450, 64);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('关于', 225, 75);
    
    ctx.fillStyle = '#667eea';
    ctx.font = '80px Arial';
    ctx.fillText('📋', 185, 350);
    ctx.fillStyle = '#333';
    ctx.font = 'bold 24px Arial';
    ctx.fillText('招标助手 Pro', 225, 420);
    ctx.fillStyle = '#666';
    ctx.font = '16px Arial';
    ctx.fillText('版本 1.0.0', 225, 450);
    ctx.font = '14px Arial';
    ctx.fillText('专业的招标信息监控与分析工具', 225, 490);
    ctx.fillText('帮助您实时获取招标信息', 225, 515);
    ctx.fillText('智能筛选匹配项目', 225, 540);
}

// 下载截图
function downloadScreenshot(num, name) {
    const canvas = document.getElementById('canvas' + num);
    const link = document.createElement('a');
    link.download = 'screenshot-' + num + '-' + name + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

// 初始化绘制
window.onload = function() {
    drawScreenshot1();
    drawScreenshot2();
    drawScreenshot3();
    drawScreenshot4();
    drawScreenshot5();
};
</script>
</body>
</html>
